<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Toolkit — Warehouse Fulfillment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    /* Aligned with FLOW Mega Apps light theme (css/styles.css) */
    --bg:#F3F4F5;--card:#ffffff;--card2:#faf9fd;--card3:#f4f2f8;
    --primary:#6337D8;--primary-light:#8976FF;--primary-hover:#5228c0;
    --accent:#2ED8FB;--green:#0ea672;--amber:#d97706;--red:#dc2626;
    --text:#13061C;--text2:#5a5267;--text3:#8c8497;
    --border:#e5e2ea;--border2:#d8d4e0;
    --radius:10px;--radius-sm:6px;--radius-lg:14px;
    --shadow:0 1px 3px rgba(19,6,28,.06),0 1px 2px rgba(19,6,28,.04);
    --shadow-hover:0 4px 12px rgba(19,6,28,.1);
  }
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  /* HEADER */
  .hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);padding:36px 40px 30px;position:relative;overflow:hidden;color:#fff}
  .hero::before{content:'';position:absolute;top:-90px;right:-60px;width:380px;height:380px;background:radial-gradient(circle,rgba(46,216,251,0.22) 0%,transparent 70%);pointer-events:none}
  .hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600;color:#fff;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px}
  .hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;box-shadow:0 0 8px var(--accent)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
  .hero h1{font-size:30px;font-weight:700;line-height:1.2;margin-bottom:8px;color:#fff}
  .hero p{color:rgba(255,255,255,0.85);font-size:14px;line-height:1.6;max-width:620px}
  .hero-meta{display:flex;gap:20px;margin-top:18px;flex-wrap:wrap}
  .hero-stat{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.7)}
  .hero-stat strong{color:#fff;font-weight:700}

  /* NAV TABS */
  .nav{display:flex;gap:6px;padding:14px 40px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;overflow-x:auto;box-shadow:var(--shadow)}
  .nav::-webkit-scrollbar{height:0}
  .nav-btn{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;transition:all 0.18s}
  .nav-btn:hover{background:var(--card3);color:var(--text)}
  .nav-btn.active{background:rgba(99,55,216,0.08);border-color:rgba(99,55,216,0.25);color:var(--primary)}
  .nav-btn .nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:12px}
  .n1 .nav-icon{background:rgba(99,55,216,0.12)}
  .n2 .nav-icon{background:rgba(14,166,114,0.12)}
  .n3 .nav-icon{background:rgba(46,216,251,0.16)}
  .n4 .nav-icon{background:rgba(217,119,6,0.12)}

  /* MAIN */
  .main{max-width:1100px;margin:0 auto;padding:30px 40px}
  .panel{display:none}.panel.active{display:block}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
  .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:14px}

  /* SECTION HEADER */
  .sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .sec-hdr h2{font-size:19px;font-weight:700;color:var(--text)}
  .sec-dot{width:9px;height:9px;border-radius:50%}

  /* SCORING */
  .score-grid{display:grid;gap:10px}
  .score-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px 18px;box-shadow:var(--shadow)}
  .score-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
  .score-item-label{font-size:14px;font-weight:600;color:var(--text)}
  .score-item-desc{font-size:12px;color:var(--text3);margin-top:2px}
  .score-pts-badge{display:flex;align-items:center;justify-content:center;min-width:44px;height:28px;border-radius:var(--radius-sm);background:rgba(99,55,216,0.08);border:1px solid rgba(99,55,216,0.2);font-size:13px;font-weight:700;color:var(--primary);font-family:'JetBrains Mono',monospace;flex-shrink:0}
  .score-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-family:inherit;font-size:13px;cursor:pointer;transition:border-color 0.2s}
  .score-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,55,216,.1)}

  .result-panel{background:linear-gradient(135deg,var(--card2),var(--card3));border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;text-align:center;margin-top:18px;box-shadow:var(--shadow)}
  .result-number{font-size:68px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;transition:all 0.4s}
  .result-max{font-size:15px;color:var(--text3);margin-top:4px}
  .result-tier{font-size:19px;font-weight:700;margin-top:16px}
  .result-action{font-size:14px;color:var(--text2);margin-top:8px;line-height:1.6;max-width:520px;margin-left:auto;margin-right:auto}

  /* PROGRESS BAR */
  .score-bar-wrap{background:var(--card3);border-radius:4px;height:7px;margin:16px auto 8px;overflow:hidden;border:1px solid var(--border)}
  .score-bar{height:100%;border-radius:4px;transition:width 0.5s ease,background 0.4s}
  .tier-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}

  /* TEMPLATES */
  .tmpl-chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.18s;white-space:nowrap}
  .chip:hover{border-color:var(--primary);color:var(--primary)}
  .chip.active{background:rgba(99,55,216,0.08);border-color:var(--primary);color:var(--primary)}
  .tmpl-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .tmpl-title{font-size:14px;font-weight:700;color:var(--text)}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .badge-wa{background:rgba(37,211,102,0.12);color:#1faa54;border:1px solid rgba(37,211,102,0.3)}
  .badge-email{background:rgba(46,216,251,0.14);color:#0b8fb0;border:1px solid rgba(46,216,251,0.35)}
  .tmpl-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;font-size:13px;line-height:1.8;white-space:pre-wrap;color:var(--text);font-family:'JetBrains Mono',monospace;min-height:180px}
  .copy-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--card);font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.18s}
  .copy-btn:hover{border-color:var(--primary);color:var(--primary)}
  .copy-btn svg{width:14px;height:14px}
  .tmpl-tips{background:rgba(217,119,6,0.07);border:1px solid rgba(217,119,6,0.22);border-radius:var(--radius);padding:13px 16px;font-size:13px;color:var(--text2);line-height:1.6;margin-top:12px}
  .tmpl-tips::before{content:'💡 ';font-weight:600}

  /* OBJECTIONS */
  .obj-list{display:flex;flex-direction:column;gap:8px}
  .obj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;box-shadow:var(--shadow)}
  .obj-card:hover{border-color:var(--border2)}
  .obj-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
  .obj-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .obj-title{font-size:14px;font-weight:600;color:var(--text);flex:1}
  .obj-level{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap}
  .lvl-high{background:rgba(220,38,38,0.1);color:var(--red);border:1px solid rgba(220,38,38,0.25)}
  .lvl-med{background:rgba(217,119,6,0.1);color:var(--amber);border:1px solid rgba(217,119,6,0.25)}
  .lvl-low{background:rgba(14,166,114,0.1);color:var(--green);border:1px solid rgba(14,166,114,0.25)}
  .obj-chevron{width:18px;height:18px;color:var(--text3);transition:transform 0.25s;flex-shrink:0}
  .obj-chevron.open{transform:rotate(180deg)}
  .obj-body{display:none;padding:0 18px 18px}
  .obj-body.open{display:block}
  .acr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
  @media(max-width:700px){.acr-grid{grid-template-columns:1fr}}
  .acr-block{border-radius:var(--radius-sm);padding:12px 14px}
  .acr-a{background:rgba(99,55,216,0.05);border:1px solid rgba(99,55,216,0.15)}
  .acr-c{background:rgba(217,119,6,0.05);border:1px solid rgba(217,119,6,0.15)}
  .acr-r{background:rgba(14,166,114,0.05);border:1px solid rgba(14,166,114,0.15)}
  .acr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
  .acr-a .acr-label{color:var(--primary)}
  .acr-c .acr-label{color:var(--amber)}
  .acr-r .acr-label{color:var(--green)}
  .acr-block>div:last-child{font-size:12px;color:var(--text2)}
  .acr-script{font-size:12px;line-height:1.7;color:var(--text2);font-style:italic}
  .acr-notes{background:var(--card3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--text3);line-height:1.6;margin-top:4px}
  .acr-notes::before{content:'📌 ';font-style:normal}

  /* PIPELINE */
  .pipeline-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  @media(max-width:600px){.pipeline-stats{grid-template-columns:repeat(2,1fr)}}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
  .stat-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .stat-lbl{font-size:11px;color:var(--text3);margin-top:4px}
  .pipeline-table{width:100%;border-collapse:collapse;font-size:13px}
  .pipeline-table th{background:var(--bg);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
  .pipeline-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .pipeline-table tr:hover td{background:var(--card2)}
  .stage-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
  .stage-prospecting{background:rgba(140,132,151,0.15);color:var(--text2)}
  .stage-qualified{background:rgba(46,216,251,0.16);color:#0b8fb0}
  .stage-demo{background:rgba(99,55,216,0.1);color:var(--primary)}
  .stage-proposal{background:rgba(217,119,6,0.12);color:var(--amber)}
  .stage-negotiation{background:rgba(220,38,38,0.1);color:var(--red)}
  .stage-won{background:rgba(14,166,114,0.12);color:var(--green)}
  .score-pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .add-row-btn{display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:transparent;font-family:inherit;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;transition:all 0.18s;margin-top:12px;width:100%;justify-content:center}
  .add-row-btn:hover{border-color:var(--primary);color:var(--primary)}
  .cell-input{background:#fff;border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-family:inherit;font-size:12px}
  .cell-input:focus{outline:none;border-color:var(--primary)}

  /* EDITABLE FEATURES — deal info, forms, deals table, toast */
  .tk-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:600px){.tk-row{grid-template-columns:1fr}}
  .tk-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .tk-field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
  .tk-input,.tk-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-family:inherit;font-size:13px}
  .tk-textarea{font-family:'JetBrains Mono',monospace;line-height:1.6;resize:vertical}
  .tk-input:focus,.tk-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,55,216,.1)}
  .tk-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .tk-primary:hover{background:var(--primary-hover);color:#fff;border-color:var(--primary-hover)}
  .tk-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:6px}
  .tk-del{border:0;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;font-weight:700;padding:3px 8px;border-radius:6px;line-height:1;flex-shrink:0}
  .tk-del:hover{background:rgba(220,38,38,0.1);color:var(--red)}
  .tk-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:rgba(99,55,216,.1);color:var(--primary);padding:2px 7px;border-radius:6px}
  .deals-table{width:100%;border-collapse:collapse;font-size:13px}
  .deals-table th{background:var(--bg);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
  .deals-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
  .tk-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shadow-hover);opacity:0;transition:opacity .2s;pointer-events:none}
  .tk-toast.show{opacity:1}
  .tk-toast.err{background:var(--red)}
  .tk-toast.ok{background:var(--green)}
  .hidden{display:none!important}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

  /* FOOTER */
  .footer{text-align:center;padding:28px 40px;color:var(--text3);font-size:12px;border-top:1px solid var(--border);margin-top:36px}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag" id="heroTag">● Live</div>
  <h1 id="heroTitle"></h1>
  <p id="heroDesc"></p>
  <div class="hero-meta" id="heroMeta"></div>
</div>

<div class="nav">
  <button class="nav-btn n1 active" data-tab="scoring"><div class="nav-icon">⚡</div> <span data-nav="scoring"></span></button>
  <button class="nav-btn n2" data-tab="followup"><div class="nav-icon">✉</div> <span data-nav="followup"></span></button>
  <button class="nav-btn n3" data-tab="objection"><div class="nav-icon">🛡</div> <span data-nav="objection"></span></button>
  <button class="nav-btn n4" data-tab="pipeline"><div class="nav-icon">📊</div> <span data-nav="pipeline"></span></button>
</div>

<div class="main">

  <!-- SCORING -->
  <div id="panel-scoring" class="panel active">
    <div class="sec-hdr">
      <div class="sec-dot" style="background:var(--primary)"></div>
      <h2 data-sec="scoring"></h2>
    </div>
    <div class="card">
      <div class="card-title" id="deal-info-title"></div>
      <div class="tk-row">
        <div class="tk-field"><label id="lbl-client"></label><input type="text" id="deal-client" class="tk-input"/></div>
        <div class="tk-field" style="margin-bottom:0"><label id="lbl-pic"></label><select id="deal-pic" class="tk-input"></select></div>
      </div>
    </div>
    <div class="score-grid" id="score-grid"></div>
    <div class="result-panel">
      <div class="result-number" id="r-num" style="color:var(--text3)">0</div>
      <div class="result-max" id="r-max">/ 100</div>
      <div class="score-bar-wrap" style="max-width:400px">
        <div class="score-bar" id="r-bar" style="width:0%;background:var(--text3)"></div>
      </div>
      <div class="tier-labels" style="max-width:400px;margin:0 auto" id="tier-labels"></div>
      <div class="result-tier" id="r-tier">—</div>
      <div class="result-action" id="r-action"></div>
      <button class="copy-btn tk-primary" id="saveDealBtn" style="margin-top:18px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        <span id="saveDealLabel"></span>
      </button>
    </div>
    <div class="card" style="margin-top:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px">
        <div class="card-title" id="saved-deals-title" style="margin-bottom:0"></div>
        <button class="copy-btn" id="exportExcelBtn" style="margin-top:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span id="exportExcelLabel"></span>
        </button>
      </div>
      <div style="overflow-x:auto">
        <table class="deals-table">
          <thead><tr id="deals-head"></tr></thead>
          <tbody id="deals-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- FOLLOW-UP -->
  <div id="panel-followup" class="panel">
    <div class="sec-hdr">
      <div class="sec-dot" style="background:var(--green)"></div>
      <h2 data-sec="followup"></h2>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px">
        <div class="card-title" id="t-chips-title" style="margin-bottom:0"></div>
        <button class="copy-btn tk-primary tk-sup-only hidden" id="addTmplBtn" style="margin-top:0"></button>
      </div>
      <div class="tmpl-chips" id="tmpl-chips"></div>
    </div>
    <div class="card hidden" id="tmplForm">
      <div class="card-title" id="tmplFormTitle"></div>
      <div class="tk-field"><label id="lbl-tf-label"></label><input type="text" id="tf-label" class="tk-input"/></div>
      <div class="tk-field"><label id="lbl-tf-channel"></label><select id="tf-channel" class="tk-input"><option>WhatsApp</option><option>Email</option></select></div>
      <div class="tk-field"><label id="lbl-tf-content"></label><textarea id="tf-content" class="tk-textarea" rows="8"></textarea></div>
      <div class="tk-field"><label id="lbl-tf-tips"></label><textarea id="tf-tips" class="tk-textarea" rows="2"></textarea></div>
      <div class="tk-actions">
        <button class="chip" id="tf-cancel"></button>
        <button class="copy-btn tk-primary" id="tf-save" style="margin-top:0"></button>
      </div>
    </div>
    <div class="card">
      <div class="tmpl-meta">
        <span class="tmpl-title" id="t-title">—</span>
        <span class="badge" id="t-badge"></span>
        <span class="tk-tag hidden" id="t-custom-tag">Custom</span>
      </div>
      <div class="tmpl-box" id="t-content"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="copy-btn" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          <span id="copyBtnLabel"></span>
        </button>
        <button class="copy-btn hidden" id="delTmplBtn"></button>
      </div>
      <div class="tmpl-tips" id="t-tips"></div>
    </div>
  </div>

  <!-- OBJECTION -->
  <div id="panel-objection" class="panel">
    <div class="sec-hdr">
      <div class="sec-dot" style="background:var(--accent)"></div>

// ---- postMessage bridge to the parent app (data layer + roles + audit) ----
const HOST = window.parent;
const EMBEDDED = !!HOST && HOST !== window;
let _seq = 0;
const _pending = {};
function hostRequest(action, payload){
  return new Promise((resolve,reject)=>{
    if(!EMBEDDED){ reject(new Error('Toolkit must run inside FLOW Mega Apps.')); return; }
    const reqId = 'r'+(++_seq);
    _pending[reqId] = { resolve, reject };
    HOST.postMessage({ channel:'flow-toolkit', reqId, action, payload }, '*');
    setTimeout(()=>{ if(_pending[reqId]){ delete _pending[reqId]; reject(new Error('Request timed out')); } }, 12000);
  });
}

function buildScoring(){
  const crit = SCORE[LANG];
  if (selScoreIdx.length !== crit.length) selScoreIdx = new Array(crit.length).fill(0);
  const g = $('score-grid');
  g.innerHTML = '';
  crit.forEach((c,i)=>{
    const el = document.createElement('div');
    el.className = 'score-item';
    el.innerHTML = `<div class="score-item-top">
      <div><div class="score-item-label">${c.label}</div><div class="score-item-desc">${c.desc}</div></div>
      <div class="score-pts-badge" id="pts${i}">${c.opts[selScoreIdx[i]][1]}</div>
    </div>
    <select class="score-select" data-idx="${i}">
      ${c.opts.map((o,j)=>`<option value="${j}"${j===selScoreIdx[i]?' selected':''}>${o[0]} (${o[1]} ${u().pts})</option>`).join('')}
    </select>`;
    g.appendChild(el);
  });
  g.querySelectorAll('select').forEach(s=>{
    s.addEventListener('change',()=>{ selScoreIdx[+s.dataset.idx] = s.selectedIndex; recalcScore(); });
  });
  recalcScore();
}

function recalcScore(){
  const crit = SCORE[LANG];
  let total = 0;
  crit.forEach((c,i)=>{
    const pts = c.opts[selScoreIdx[i]][1];
    total += pts;
    const b = $('pts'+i); if (b) b.textContent = pts;
  });
  const rn = $('r-num'), rb = $('r-bar');
  rn.textContent = total;
  rb.style.width = Math.min(total,100) + '%';
  const T = TIERS[LANG];
  let color, tier;
  if (total>=70){ color='#6337D8'; tier=T.hot; }
  else if (total>=45){ color='#d97706'; tier=T.warm; }
  else if (total>=20){ color='#2ED8FB'; tier=T.cold; }
  else { color='#8c8497'; tier=T.hold; }
  rb.style.background = color;
  rn.style.color = (total===0) ? 'var(--text3)' : color;
  $('r-tier').textContent = (total===0) ? '—' : tier.tier;
  $('r-tier').style.color = color;
  $('r-action').textContent = (total===0) ? u().scoringDefault : tier.action;
  lastScore = total;
  lastTier = (total===0) ? '' : tier.tier;
}

// Export the Pipeline Tracker table (sample rows + rows the user
// added) to a CSV file. Reads live cell values straight from the DOM.
function exportPipelineCSV(){
  const rows = [u().pipeHead.slice()];
  document.querySelectorAll('#pipe-tbody tr').forEach(tr=>{
    const cells = [];
    tr.querySelectorAll('td').forEach(td=>{
      const f = td.querySelector('input,select');
      cells.push(f ? (f.value||'') : td.textContent.trim());
    });
    if (cells.some(c=>c!=='')) rows.push(cells);
  });
  const csv = rows.map(r=>r.map(c=>{
    const s = String(c).replace(/"/g,'""');
    return /[",\n\r]/.test(s) ? '"'+s+'"' : s;
  }).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sales-pipeline.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 100);
}

  try{
    const [tpls,objs,deals] = await Promise.all([
      hostRequest('list',{kind:'templates'}),
      hostRequest('list',{kind:'objections'}),
      hostRequest('list',{kind:'deals'})
    ]);
    customTemplates = (tpls||[]).map(t=>({ id:t.id, _custom:true, label:t.label||'(untitled)', channel:t.channel==='Email'?'Email':'WhatsApp', content:t.content||'', tips:t.tips||'' }));
    customObjections = (objs||[]).map(o=>({ id:o.id, _custom:true, title:o.title||'(untitled)', level:['high','med','low'].includes(o.level)?o.level:'med', ack:o.ack||'', challenge:o.challenge||'', redirect:o.redirect||'', notes:o.notes||'' }));
    savedDeals = (deals||[]).slice().sort((a,b)=>String(b.savedAt||'').localeCompare(String(a.savedAt||'')));
    buildTemplates(); buildObjections(); renderDeals();
  }catch(e){ console.warn('[Sales Toolkit] load failed:', e); }
  // Sales PIC dropdown — the Sales-team roster from the app.
  try{
    salesPics = (await hostRequest('salesPics')) || [];
    renderPicOptions();
  }catch(e){ console.warn('[Sales Toolkit] sales PIC list failed:', e); }
}

// ---- Saved deals ----
function fmtDate(s){ if(!s) return ''; const d=new Date(s); return isNaN(d.getTime())?'':d.toLocaleDateString(); }
function renderPicOptions(){
  const sel = $('deal-pic');
  if(!sel) return;
  const cur = sel.value;
  sel.innerHTML = `<option value="">${esc(u().picPlaceholder)}</option>`
    + salesPics.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('');
  if(cur && salesPics.indexOf(cur)>=0) sel.value = cur;
}
function renderDeals(){
  const cols = u().dealCols;
  const head = $('deals-head'), tb = $('deals-tbody');
  if(!head || !tb) return;
  head.innerHTML = cols.map(c=>`<th>${c}</th>`).join('') + (USER.canManage?'<th></th>':'');
  if(!savedDeals.length){
    tb.innerHTML = `<tr><td colspan="${cols.length+1}" style="text-align:center;color:var(--text3);padding:22px">${u().noDeals}</td></tr>`;
    return;
  }
  tb.innerHTML = savedDeals.map(d=>`<tr>
    <td style="font-weight:600;color:var(--text)">${esc(d.client)}</td>
    <td style="color:var(--text2)">${esc(d.salesPic||'—')}</td>
    <td><span class="score-pill" style="${scoreStyle(d.score||0)}">${d.score!=null?d.score:'—'}</span></td>
    <td style="font-size:12px;color:var(--text2)">${esc(d.tier||'—')}</td>
    <td style="font-size:12px;color:var(--text3)">${fmtDate(d.savedAt)}</td>
    <td style="font-size:12px;color:var(--text3)">${esc(d.createdBy||'—')}</td>
    ${USER.canManage?`<td><button class="tk-del" data-dealdel="${esc(d.id)}" title="Delete">✕</button></td>`:''}
  </tr>`).join('');
  tb.querySelectorAll('[data-dealdel]').forEach(b=>b.addEventListener('click',()=>deleteDeal(b.dataset.dealdel)));
}
async function saveDeal(){
  const client = $('deal-client').value.trim();
  const pic = $('deal-pic').value.trim();
  if(!client){ toast(u().needClient,'err'); $('deal-client').focus(); return; }
  const crit = SCORE[LANG];
  const criteria = crit.map((c,i)=>({ label:c.label, choice:c.opts[selScoreIdx[i]][0], pts:c.opts[selScoreIdx[i]][1] }));
  const btn = $('saveDealBtn'); btn.disabled = true;
  try{
    await hostRequest('add',{ kind:'deals', data:{ client, salesPic:pic, score:lastScore, tier:lastTier, criteria, savedAt:new Date().toISOString() } });
    toast(u().dealSaved,'ok');
    $('deal-client').value = ''; $('deal-pic').value = '';
    const deals = await hostRequest('list',{kind:'deals'});
    savedDeals = (deals||[]).slice().sort((a,b)=>String(b.savedAt||'').localeCompare(String(a.savedAt||'')));
    renderDeals();
  }catch(e){ toast(e.message,'err'); }
  finally{ btn.disabled = false; }
}
async function deleteDeal(id){
  if(!confirm(u().confirmDel)) return;
  try{
    await hostRequest('delete',{kind:'deals',id});
    toast(u().deleted,'ok');
    savedDeals = savedDeals.filter(d=>d.id!==id);
    renderDeals();
  }catch(e){ toast(e.message,'err'); }
}
function exportDeals(){
  if(!savedDeals.length){ toast(u().noDeals,'err'); return; }
  const headers = u().dealCols;
  const rows = savedDeals.map(d=>[ d.client||'', d.salesPic||'', d.score!=null?d.score:'', d.tier||'', fmtDate(d.savedAt), d.createdBy||'' ]);
  hostRequest('exportDeals',{headers,rows}).catch(e=>toast(e.message,'err'));
}

// ---- Add / delete custom follow-up templates (supervisors) ----
function openTmplForm(){ $('tmplForm').classList.remove('hidden'); $('tf-label').focus(); }
function closeTmplForm(){ $('tmplForm').classList.add('hidden'); $('tf-label').value=''; $('tf-content').value=''; $('tf-tips').value=''; }
async function saveTemplate(){
  const label = $('tf-label').value.trim(), channel = $('tf-channel').value;
  const content = $('tf-content').value.trim(), tips = $('tf-tips').value.trim();
  if(!label || !content){ toast(u().needFields,'err'); return; }
  const btn = $('tf-save'); btn.disabled = true;
  try{
    await hostRequest('add',{ kind:'templates', data:{ label, channel, content, tips } });
    toast(u().itemSaved,'ok');
    closeTmplForm();
    const tpls = await hostRequest('list',{kind:'templates'});
    customTemplates = (tpls||[]).map(t=>({ id:t.id, _custom:true, label:t.label||'(untitled)', channel:t.channel==='Email'?'Email':'WhatsApp', content:t.content||'', tips:t.tips||'' }));
    activeTmpl = TEMPLATES[LANG].length + customTemplates.length - 1;
    buildTemplates();
  }catch(e){ toast(e.message,'err'); }
  finally{ btn.disabled = false; }
}
async function deleteTemplate(){
  const t = allTemplates()[activeTmpl];
  if(!t || !t._custom) return;
  if(!confirm(u().confirmDel)) return;
  try{
    await hostRequest('delete',{kind:'templates',id:t.id});
    toast(u().deleted,'ok');
    customTemplates = customTemplates.filter(x=>x.id!==t.id);
    activeTmpl = 0;
    buildTemplates();
  }catch(e){ toast(e.message,'err'); }
}

// ---- Add / delete custom objections (supervisors) ----
function openObjForm(){ $('objForm').classList.remove('hidden'); $('of-title').focus(); }
function closeObjForm(){ $('objForm').classList.add('hidden'); ['of-title','of-ack','of-challenge','of-redirect','of-notes'].forEach(id=>{ $(id).value=''; }); }
async function saveObjection(){
  const data = { title:$('of-title').value.trim(), level:$('of-level').value, ack:$('of-ack').value.trim(), challenge:$('of-challenge').value.trim(), redirect:$('of-redirect').value.trim(), notes:$('of-notes').value.trim() };
  if(!data.title || !data.ack || !data.challenge || !data.redirect){ toast(u().needFields,'err'); return; }
  const btn = $('of-save'); btn.disabled = true;
  try{
    await hostRequest('add',{ kind:'objections', data });
    toast(u().itemSaved,'ok');
    closeObjForm();
    const objs = await hostRequest('list',{kind:'objections'});
    customObjections = (objs||[]).map(o=>({ id:o.id, _custom:true, title:o.title||'(untitled)', level:['high','med','low'].includes(o.level)?o.level:'med', ack:o.ack||'', challenge:o.challenge||'', redirect:o.redirect||'', notes:o.notes||'' }));
    buildObjections();
  }catch(e){ toast(e.message,'err'); }
  finally{ btn.disabled = false; }
}
async function deleteObjection(id){
  if(!confirm(u().confirmDel)) return;
  try{
    await hostRequest('delete',{kind:'objections',id});
    toast(u().deleted,'ok');
    customObjections = customObjections.filter(x=>x.id!==id);
    buildObjections();
  }catch(e){ toast(e.message,'err'); }
}

// ============================================================
// STATIC TEXT + TABS + LANGUAGE
// ============================================================

  $('r-max').textContent = '/ 100';
  $('tier-labels').innerHTML = d.tierLabels.map(l=>`<span>${l}</span>`).join('');
  $('t-chips-title').textContent = d.chipsTitle;
  $('copyBtnLabel').textContent = d.copyBtn;
  $('acr-title').textContent = d.acrTitle;

  $('acr-c-desc').textContent = d.acrDesc[1];
  $('acr-r-desc').textContent = d.acrDesc[2];
  $('pipe-deals-title').textContent = d.dealsTitle;

  $('footer').textContent = d.footer;

  $('deal-info-title').textContent = d.dealInfo;

  $('lbl-of-ack').textContent = d.fAck;
  $('lbl-of-challenge').textContent = d.fChallenge;
  $('lbl-of-redirect').textContent = d.fRedirect;

  const ofLevel = $('of-level'), curLevel = ofLevel.value || 'med';

  ofLevel.value = curLevel;
}
function renderAll(){
  applyStaticText();
  buildScoring();
  buildTemplates();
  buildObjections();
  buildPipeline();
  renderDeals();
  renderPicOptions();
}
function setLang(lang){
  if (lang===LANG || !UI[lang]) return;
  LANG = lang;
  try { localStorage.setItem('flow.lang', lang); } catch(e){}
  renderAll();
}
function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  $('panel-'+name).classList.add('active');
  document.querySelector(`.nav-btn[data-tab="${name}"]`).classList.add('active');
}

// ============================================================
// WIRE UP
// ============================================================
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
$('copyBtn').addEventListener('click', copyTmpl);
$('addRowBtn').addEventListener('click', addRow);
$('exportCsvBtn').addEventListener('click', exportPipelineCSV);

// Deal scoring — save + export
$('saveDealBtn').addEventListener('click', saveDeal);
$('exportExcelBtn').addEventListener('click', exportDeals);
// Add-template form
$('addTmplBtn').addEventListener('click', openTmplForm);
$('tf-cancel').addEventListener('click', closeTmplForm);
$('tf-save').addEventListener('click', saveTemplate);
$('delTmplBtn').addEventListener('click', deleteTemplate);
// Add-objection form
$('addObjBtn').addEventListener('click', openObjForm);
$('of-cancel').addEventListener('click', closeObjForm);
$('of-save').addEventListener('click', saveObjection);

// Sync language with the parent app: it writes the same localStorage
// key, and `storage` events fire across same-origin documents.
window.addEventListener('storage', e=>{
  if (e.key==='flow.lang' && (e.newValue==='id'||e.newValue==='en')) setLang(e.newValue);
});

// Receive user context + data replies from the parent app.
window.addEventListener('message', e=>{
  const m = e.data;
  if(!m || m.channel!=='flow-toolkit-host') return;
  if(m.type==='flow-user'){
    USER = { email:m.email||'', role:m.role||'', canManage:!!m.canManage };
    onUserReady();
    return;
  }
  if(m.type==='reply' && _pending[m.reqId]){
    const p = _pending[m.reqId]; delete _pending[m.reqId];
    m.ok ? p.resolve(m.data) : p.reject(new Error(m.error||'Request failed'));
  }
});

renderAll();
if(EMBEDDED) HOST.postMessage({ channel:'flow-toolkit', action:'ready' }, '*');
</script>
